<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#c0845a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Hair & Lash Story"/>
  <title>Hair & Lash Story</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💇🏻</text></svg>"/>
  <link rel="manifest" href="manifest.json"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fdf6f0; font-family: 'Noto Sans TC', 'PingFang TC', sans-serif; }
    #root { min-height: 100vh; }
    #loading {
      position: fixed; inset: 0; background: #fdf6f0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px; z-index: 9999;
    }
    #loading .icon { font-size: 52px; animation: bounce 0.8s infinite alternate; }
    #loading .text { font-size: 15px; color: #b09080; font-weight: 600; letter-spacing: 1px; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="icon">💇🏻‍♀️</div>
    <div class="text">Hair & Lash Story</div>
  </div>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react" src="app.js"></script>
  <script>
    function tryMount() {
      if (typeof App !== 'undefined') {
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
        document.getElementById('loading').style.display = 'none';
      } else {
        setTimeout(tryMount, 100);
      }
    }
    tryMount();
  </script>
</body>
</html>
