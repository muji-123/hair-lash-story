<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#c0845a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Hair &amp; Lash Story"/>
  <title>Hair &amp; Lash Story</title>
  <link rel="icon" href="icon.png"/>
  <link rel="apple-touch-icon" href="icon.png"/>
  <link rel="manifest" href="manifest.json"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#fdf6f0;font-family:'Noto Sans TC','PingFang TC',sans-serif}
    #root{min-height:100vh}
    #err{display:none;padding:20px;color:#c0845a;font-size:14px;text-align:center;margin-top:40px}
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="err"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="app.js"></script>
  <script>
    try {
      ReactDOM.createRoot(document.getElementById('root')).render(
        React.createElement(window.App)
      );
    } catch(e) {
      document.getElementById('err').style.display = 'block';
      document.getElementById('err').textContent = 'Error: ' + e.message;
      console.error(e);
    }
  </script>
</body>
</html>
